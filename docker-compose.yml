# ─────────────────────────────────────────────────────────────────
# DocuMind AI — Docker Compose
# Phase 9: Docker & Deployment
# ─────────────────────────────────────────────────────────────────

version: "3.9"

services:
  documind:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: documind-ai
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./vector_db:/app/vector_db
      - ./models:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s